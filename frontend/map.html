<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkiRoute - Mapa</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div id="map"></div>

    <div class="top-bar">
      <button class="btn-back" onclick="history.back()">‹</button>
      <div class="top-bar-card">
        <span class="estacion-nombre" id="titulo-estacion">Cargando...</span>
      </div>
    </div>

    <div class="bottom-panel">
      <div class="panel-handle"></div>

      <div class="panel-actions">
        <div class="punto-row" id="rowOrigen">
          <span class="punto-dot dot-origen">●</span>
          <input type="text" id="inputOrigen" class="punto-input" placeholder="Origen..." autocomplete="off">
          <button class="btn-clear" id="clearOrigen">×</button>
          <div class="autocomplete-dropdown" id="dropOrigen"></div>
        </div>
        <div class="punto-row" id="rowDestino">
          <span class="punto-dot dot-destino">●</span>
          <input type="text" id="inputDestino" class="punto-input" placeholder="Destino..." autocomplete="off">
          <button class="btn-clear" id="clearDestino">×</button>
          <div class="autocomplete-dropdown" id="dropDestino"></div>
        </div>
      </div>

      <button class="btn-calcular" id="btnCalcular">Calcular ruta</button>

      <div class="leyenda">
        <div class="leyenda-item">
          <div class="leyenda-linea" style="background:#16a34a"></div>
          <span>Verde</span>
        </div>
        <div class="leyenda-item">
          <div class="leyenda-linea" style="background:#2563eb"></div>
          <span>Azul</span>
        </div>
        <div class="leyenda-item">
          <div class="leyenda-linea" style="background:#dc2626"></div>
          <span>Roja</span>
        </div>
        <div class="leyenda-item">
          <div class="leyenda-linea" style="background:#111111"></div>
          <span>Negra</span>
        </div>
        <div class="leyenda-item">
          <div class="leyenda-remonte"></div>
          <span>Remonte</span>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/mapa.js"></script>
  </body>
</html>
